<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Liver Tumor Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-toggle.css') }}">
</head>
<body>
    
    <button id="theme-toggle" class="theme-toggle"></button>

    <div class="auth-wrapper">
        <div class="auth-brand-panel">
            <h2>Liver Tumor Detection</h2>
            <p>Advanced Analysis Dashboard</p>
        </div>
        <div class="auth-form-panel">
            <div class="auth-container">
                <h1>Login</h1>
                <div id="error-message" class="error"></div>
                <form id="login-form" class="auth-form">
                    <input type="email" name="email" placeholder="Email" required>
                    <input type="password" name="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                </form>
                <div class="auth-link">
                    <a href="/forgot-password">Forgot Password?</a>
                </div>
                <div class="auth-link">
                    Need an account? <a href="/signup">Sign Up</a>
                </div>
            </div>
        </div>
    </div>
    
    <script type="module" src="{{ url_for('static', filename='js/auth.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>
</body>
</html>
