<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Liver Tumor Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme-toggle.css') }}">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle"></button>
    
    <div class="auth-wrapper">
        <div class="auth-brand-panel">
            <h2>Liver Tumor Detection</h2>
            <p>Advanced Analysis Dashboard</p>
        </div>
        <div class="auth-form-panel">
            <div class="auth-container">
                <h1>Reset Password</h1>
                <p style="text-align: center; color: #6c757d; margin-top: -15px; margin-bottom: 15px;">Enter your email to receive a password reset link.</p>
                <div id="error-message" class="error"></div>
                <div id="success-message" class="success"></div>
                <form id="forgot-password-form" class="auth-form">
                    <input type="email" name="email" placeholder="Email" required>
                    <button type="submit">Send Reset Email</button>
                </form>
                <div class="auth-link">
                    Remembered your password? <a href="/login">Login</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/auth.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}" defer></script>
</body>
</html>
